name: TestNG CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Exercise 2 Test
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng-exercise2.xml

      - name: Run Exercise 3 Test
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng-exercise3.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
